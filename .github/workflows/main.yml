name: Salesforce CI (Stub Mode)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate structure
        run: |
          echo "Checking Salesforce project structure..."
          ls -R force-app || exit 1

      - name: Check for required metadata folder
        run: |
          if [ ! -d "force-app" ]; then
            echo "Missing Salesforce metadata"
            exit 1
          fi

      - name: Simulate quality checks
        run: |
          echo "Running code quality checks..."
          echo "✔ No syntax validation errors (simulated)"
          echo "✔ Structure valid"
